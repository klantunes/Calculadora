<!DOCTYPE html>
<html>
    <head>
        <title>
            Calculadora
        </title>
        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link rel="stylesheet" href="index.css">
    
    </head>

<body>
    <div class="calculadora">
        
        <div class="display">
            <div class="historico"></div>
            <div class="valor">0</div>
        </div>
       

    <div class="botoes">
        <div class="linha-controles">
        <button class="linha-back">C</button>
        <button class="linha-back">⌫</button>
    </div>

        <div class="numeros">
            <div class="linha">   
        
        </div>

        <div class="linha">     
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operadores">x</button>
        </div>
        
        
        
        <div class="linha">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operadores">-</button>
         </div>
            
         <div class="linha">     
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operadores">+</button>
        </div>   
        <div class="linha">     
        <button class="operadores">÷</button>
        <button>0</button>
        <button class="button-point">.</button>
        <button class="resultado">=</button>
        </div>  
        

    </div>

<script src="script.js"></script>
</body>

</html>
